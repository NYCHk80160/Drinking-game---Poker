  <h1>遊戲介紹</h1>
  <p><a href="index.html">開始遊戲</a> ｜ <a href="rules.html">規則一覽</a></p>
  <p>「酒game 大排檔」是一個簡易線上抽牌飲酒遊戲。玩家輪流抽牌，根據抽到的牌面執行對應指令，增加互動與歡樂。</p>
  <h2>特色</h2>
  <ul style="line-height:1.6">
    <li>可選擇是否加入 Joker</li>
    <li>支援重複抽出模式（無限模式）</li>
    <li>動畫與音效提升臨場感</li>
    <li>行動裝置友好</li>
  </ul>
  <h2>注意</h2>
  <p>請理性飲酒，適可而止；未成年或不宜飲酒者請勿參與。</p>
